<!DOCTYPE html>
<html>
<head>
  <title>My Bookshelf</title>
  <link rel= "stylesheet" href="style.css">
</head>
<body>
  
<nav>
  <a href="index.html">Home</a>
  <a href="bookshelf.html">My Bookshelf</a>  
</nav>

<h1>My Bookshelf</h1>

<div id="bookshelf"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
<script>
let bookIds = [
    "zyTCAlFPjgYC",
    "uW3kFWAAQBAJ",
    "m8dPPgAACAAJ"
    ];

  bookIds.forEach(id => {
    let url = `https://www.googleapis.com/books/v1/volumes/${id}`;
    
    $.getJSON(url, function(data) {
        let title = data.volumeInfo.title;
        let img = data.volumeInfo.imageLinks?.thumbnail || "https://via.placeholder.com/128x192?text=No+image";
        let authors = data.volumeInfo.authors ? data.volumeInfo.authors.join("") " "Unknown Author";
    })

    $("#bookshelf").append(`
      <div class="book-item">
        <img src="${img}">
      <a href="details.html?id=${id}">${title}</a>
      <p><strong>Authors:</strong> ${authors}</p>
      </div>
      `);
    });
</script>
  
</body>
</html>
